# Publishes to npm with provenance (OIDC). Configure once on npmjs.com:
# Package → Publishing access → “Configure GitHub Actions” / Trusted Publisher
# → repo: adriangrahldev/express-zod-routes, workflow: publish-npm.yml

name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm publish --provenance --access public
